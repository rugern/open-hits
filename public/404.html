<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Open Hits</title>
<script>
  // GitHub Pages serves 404.html for any unknown path. To support client-side
  // routes (e.g. /open-hits/join) on direct loads and refreshes, we redirect
  // back to index.html, encoding the original path into the query string so
  // the SPA can restore it (see the matching decoder in index.html).
  // Pattern from rafgraph/spa-github-pages.
  var pathSegmentsToKeep = 1;
  var l = window.location;
  l.replace(
    l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
    l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
    l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
    (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
    l.hash
  );
</script>
</head>
<body></body>
</html>
